<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dating Site</title>
    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        /* Hero Section Styles */
        .hero {
            background: url('your-image.jpg') no-repeat center center/cover;
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            color: white;
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.7);
        }
        .hero h1 {
            font-size: 4rem;
            margin-bottom: 1rem;
        }
        .hero button {
            font-size: 1.5rem;
            padding: 0.75rem 2rem;
        }
        /* Profile Grid */
        .profiles {
            margin-top: 3rem;
        }
        .profile-card {
            border: 1px solid #ddd;
            border-radius: 8px;
            overflow: hidden;
            text-align: center;
            padding: 1rem;
            transition: transform 0.3s;
        }
        .profile-card:hover {
            transform: scale(1.05);
        }
        .profile-card img {
            width: 100%;
            border-radius: 50%;
            height: 200px;
            object-fit: cover;
        }
    </style>
</head>
<body>
    <!-- Hero Section -->
    <section class="hero">
        <h1>Find Your Perfect Match</h1>
        <button class="btn btn-primary">Join Now</button>
    </section>

    <!-- Profile Section -->
    <div class="container profiles">
        <div class="row">
            <div class="col-md-4">
                <div class="profile-card">
                    <img src="profile1.jpg" alt="Profile 1">
                    <h3>Jane Doe</h3>
                    <p>Love to travel and explore new cultures.</p>
                </div>
            </div>
            <div class="col-md-4">
                <div class="profile-card">
                    <img src="profile2.jpg" alt="Profile 2">
                    <h3>Emily Smith</h3>
                    <p>Passionate about cooking and yoga.</p>
                </div>
            </div>
            <div class="col-md-4">
                <div class="profile-card">
                    <img src="profile3.jpg" alt="Profile 3">
                    <h3>Sarah Lee</h3>
                    <p>Adventurous spirit and a lover of animals.</p>
                </div>
            </div>
        </div>
    </div>

    <!-- Bootstrap JS (Optional for interactivity) -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
